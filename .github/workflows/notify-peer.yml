name: Notify peer agent

on:
  push:
  pull_request:
    types: [opened, closed]
  issues:
    types: [opened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build message
        id: msg
        env:
          EVENT_NAME:    ${{ github.event_name }}
          EVENT_ACTION:  ${{ github.event.action }}
          REPO:          ${{ github.repository }}
          PUSHER:        ${{ github.event.pusher.name }}
          BRANCH:        ${{ github.ref_name }}
          COMPARE:       ${{ github.event.compare }}
          COMMITS_JSON:  ${{ toJson(github.event.commits) }}
          PR_HEAD:       ${{ github.event.pull_request.head.ref }}
          PR_BASE:       ${{ github.event.pull_request.base.ref }}
          PR_TITLE:      ${{ github.event.pull_request.title }}
          PR_AUTHOR:     ${{ github.event.pull_request.user.login }}
          PR_URL:        ${{ github.event.pull_request.html_url }}
          PR_MERGED:     ${{ github.event.pull_request.merged }}
          ISSUE_TITLE:   ${{ github.event.issue.title }}
          ISSUE_AUTHOR:  ${{ github.event.issue.user.login }}
          PEER_TRIGGER:  ${{ secrets.PEER_TRIGGER }}
          TRIGGER_PREFIX: ${{ secrets.TRIGGER_PREFIX }}
          PEER_JID:      ${{ secrets.PEER_JID }}
          OWNER_JID:     ${{ secrets.OWNER_JID }}
        run: |
          PEER_GITHUB="arindakhill"

          if [ "$EVENT_NAME" = "push" ]; then
            if echo "$PUSHER" | grep -q '\[bot\]'; then
              echo "Skipping bot push from $PUSHER"
              exit 0
            fi

            COMMIT_COUNT=$(echo "$COMMITS_JSON" | jq 'length' 2>/dev/null || echo "0")
            COMMIT_MSGS=$(echo "$COMMITS_JSON" | jq -r '.[0:5] | .[] | "• " + (.message | split("\n")[0])' 2>/dev/null || echo "• (commits unavailable)")

            if [ "$PUSHER" = "$PEER_GITHUB" ]; then
              TARGET_JID="$OWNER_JID"
              TARGET_TRIGGER="$TRIGGER_PREFIX"
            else
              TARGET_JID="$PEER_JID"
              TARGET_TRIGGER="$PEER_TRIGGER"
            fi

            TRIGGER="${TARGET_TRIGGER} ${PUSHER} pushed ${COMMIT_COUNT} commit(s) to ${REPO} on branch ${BRANCH}. Commits: ${COMMIT_MSGS}. Compare: ${COMPARE}. Fetch and review the diff using gh CLI. Check for conflicts with your recent work. If you find issues, raise a GitHub issue or comment on the relevant commit. Report a summary to your peer agent."

            echo "trigger<<EOF"       >> "$GITHUB_OUTPUT"
            echo "$TRIGGER"           >> "$GITHUB_OUTPUT"
            echo "EOF"                >> "$GITHUB_OUTPUT"
            echo "recipient_jid<<EOF" >> "$GITHUB_OUTPUT"
            echo "$TARGET_JID"        >> "$GITHUB_OUTPUT"
            echo "EOF"                >> "$GITHUB_OUTPUT"

          elif [ "$EVENT_NAME" = "pull_request" ]; then
            if [ "$EVENT_ACTION" = "opened" ]; then
              TRIGGER="$PEER_TRIGGER PR opened on ${REPO}: \"${PR_TITLE}\" by ${PR_AUTHOR}. URL: ${PR_URL}. Fetch the diff, review it, and merge if the changes are correct. If you find issues, request changes."
            elif [ "$PR_MERGED" = "true" ]; then
              TRIGGER="$PEER_TRIGGER PR merged on ${REPO}: \"${PR_TITLE}\" by ${PR_AUTHOR}. Pull and sync if this affects your work."
            else
              TRIGGER="$PEER_TRIGGER PR closed unmerged on ${REPO}: \"${PR_TITLE}\" by ${PR_AUTHOR}. No action needed."
            fi
            echo "trigger<<EOF"       >> "$GITHUB_OUTPUT"
            echo "$TRIGGER"           >> "$GITHUB_OUTPUT"
            echo "EOF"                >> "$GITHUB_OUTPUT"
            echo "recipient_jid<<EOF" >> "$GITHUB_OUTPUT"
            echo "$PEER_JID"          >> "$GITHUB_OUTPUT"
            echo "EOF"                >> "$GITHUB_OUTPUT"

          elif [ "$EVENT_ACTION" = "opened" ]; then
            TRIGGER="$PEER_TRIGGER New issue opened on ${REPO}: \"${ISSUE_TITLE}\" by ${ISSUE_AUTHOR}. Check if this affects your work."
            echo "trigger<<EOF"       >> "$GITHUB_OUTPUT"
            echo "$TRIGGER"           >> "$GITHUB_OUTPUT"
            echo "EOF"                >> "$GITHUB_OUTPUT"
            echo "recipient_jid<<EOF" >> "$GITHUB_OUTPUT"
            echo "$PEER_JID"          >> "$GITHUB_OUTPUT"
            echo "EOF"                >> "$GITHUB_OUTPUT"

          else
            TRIGGER="$PEER_TRIGGER Issue closed on ${REPO}: \"${ISSUE_TITLE}\". Review if this affects your work."
            echo "trigger<<EOF"       >> "$GITHUB_OUTPUT"
            echo "$TRIGGER"           >> "$GITHUB_OUTPUT"
            echo "EOF"                >> "$GITHUB_OUTPUT"
            echo "recipient_jid<<EOF" >> "$GITHUB_OUTPUT"
            echo "$PEER_JID"          >> "$GITHUB_OUTPUT"
            echo "EOF"                >> "$GITHUB_OUTPUT"
          fi

      - name: Send via bridge
        if: steps.msg.outputs.recipient_jid != ''
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_IP:      ${{ secrets.SERVER_IP }}
        run: |
          echo "$SERVER_SSH_KEY" > /tmp/wa_key
          chmod 600 /tmp/wa_key

          JID="${{ steps.msg.outputs.recipient_jid }}"
          TRIGGER="${{ steps.msg.outputs.trigger }}"

          TRIG_B64=$(printf '%s' "$TRIGGER" | base64 -w0)

          ssh -i /tmp/wa_key \
            -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            root@"$SERVER_IP" \
            python3 - "$JID" "$TRIG_B64" << 'PYEOF'
          import requests, sys, base64
          jid     = sys.argv[1]
          trigger = base64.b64decode(sys.argv[2]).decode()
          requests.post('http://127.0.0.1:8080/send', json={'jid': jid, 'text': trigger}, timeout=10)
          PYEOF
          rm -f /tmp/wa_key
